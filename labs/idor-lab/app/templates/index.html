<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDOR Lab SPA</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
<div class="container">
  <div id="timer" class="hidden">Time: 0s</div>

  <div id="login-section">
    <h2>Login</h2>
    <input id="username" placeholder="Username"/>
    <button id="login-btn">Login</button>
    <div id="login-msg" class="message"></div>
  </div>

  <div id="user-section" class="hidden">
    <h2>Bem vindo, <span id="current-user"></span></h2>

    <div class="edit-user">
      <input id="new-name" placeholder="New name"/>
      <button id="edit-btn">Edit Name</button>
      <div id="edit-msg" class="message"></div>
    </div>

    <h3>Usuarios</h3>
    <ul id="users-list"></ul>

    <button id="logout-btn">Logout</button>
  </div>
</div>

<!-- Div de instruções -->
<div id="instructions">
  <h2>Instruções</h2>
  <p>Seu objetivo:</p>
  <ul>
    <li>Logar como Satoru</li>
    <li>Explorar os usuários disponíveis</li>
    <li>Causar dano aos usuarios utilizando os endpoints da aplicação</li>
    <li>Observar alerta ao concluir o lab</li>
  </ul>
  <p>;)</p>
</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
